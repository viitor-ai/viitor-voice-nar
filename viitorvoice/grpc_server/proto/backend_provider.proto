syntax = "proto3";

package tts.backend.v1;

service BackendProviderService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetCapabilities(GetCapabilitiesRequest) returns (CapabilitiesResponse);
  rpc PreparePrompt(PreparePromptRequest) returns (PreparePromptResponse);
  rpc Synthesize(SynthesizeRequest) returns (SynthesizeResponse);
  rpc SynthesizeStream(SynthesizeRequest) returns (stream SynthesizeStreamEvent);
}

message HealthRequest {
  RequestContext context = 1;
}

message HealthResponse {
  string status = 1;
  string message = 2;
  string backend_id = 3;
  string backend_version = 4;
}

message GetCapabilitiesRequest {
  RequestContext context = 1;
}

message CapabilitiesResponse {
  BackendCapabilities capabilities = 1;
}

message BackendCapabilities {
  string backend_id = 1;
  string backend_version = 2;
  string protocol_version = 3;

  repeated string supported_languages = 10;
  repeated string supported_output_formats = 11;
  repeated int32 supported_sample_rates = 12;
  bool supports_unary = 13;
  bool supports_true_streaming = 14;
  bool supports_prompt_registration = 15;
  bool supports_prompt_features = 16;

  repeated PromptFeatureSpec prompt_feature_specs = 30;
  repeated string supported_generation_params = 40;
  map<string, string> labels = 50;
}

message PromptFeatureSpec {
  string feature_schema = 1;
  string feature_version = 2;
  string model_version = 3;
}

message RequestContext {
  string request_id = 1;
  string app_id = 2;
  string task_id = 3;
  string trace_id = 4;
  string caller = 5;
  bool debug = 6;
  int64 deadline_ms = 7;
}

message TextSegment {
  int32 index = 1;
  string text = 2;
  string source_text = 3;
  string lang = 4;
  string emotion = 5;
  repeated string fine_tags = 6;
}

message PromptInput {
  string prompt_id = 1;
  AudioPayload prompt_audio = 2;
  repeated PromptFeatureArtifact features = 3;
  string prompt_text = 4;
  string lang = 5;
}

message OutputSpec {
  string format = 1;
  int32 sample_rate = 2;
  int32 channels = 3;
  int32 bitrate_kbps = 4;
}

message GenerationSpec {
  optional float duration = 1;
  bool multi_choices = 2;
  optional float temperature = 3;
  optional float top_p = 4;
  optional int32 top_k = 5;
  optional float repetition_penalty = 6;
  string fixed_prompt_text = 7;
  string lora_name = 8;
  map<string, string> extra = 100;
}

message SynthesizeRequest {
  RequestContext context = 1;
  PromptInput prompt = 2;
  repeated TextSegment segments = 3;
  OutputSpec output = 4;
  GenerationSpec generation = 5;
  map<string, string> metadata = 6;
}

message PreparePromptRequest {
  RequestContext context = 1;
  string prompt_id = 2;
  AudioPayload audio = 3;
  string prompt_text = 4;
  string lang = 5;
  map<string, string> metadata = 6;
}

message PreparePromptResponse {
  string backend_id = 1;
  repeated PromptFeatureArtifact artifacts = 2;
}

message PromptFeatureArtifact {
  string prompt_id = 1;
  string backend_id = 2;
  string feature_schema = 3;
  string feature_version = 4;
  string model_version = 5;
  string audio_sha256 = 6;
  bytes payload = 7;
  string content_type = 8;
  map<string, string> metadata = 9;
  string artifact_uri = 10;
}

message AudioPayload {
  bytes audio_bytes = 1;
  string content_type = 2;
  int32 sample_rate = 3;
  int32 channels = 4;
  string sample_format = 5;
  int32 duration_ms = 6;
  string audio_uri = 7;
}

message SynthesizeResponse {
  repeated AudioItem audio_items = 1;
  BackendUsage usage = 2;
}

message SynthesizeStreamEvent {
  oneof event {
    AudioChunk audio_chunk = 1;
    ItemDone item_done = 2;
    BackendLog log = 3;
  }
}

message AudioItem {
  int32 item_index = 1;
  string text = 2;
  AudioPayload audio = 3;
}

message AudioChunk {
  int32 item_index = 1;
  int32 seq = 2;
  bytes chunk = 3;
  int32 sample_rate = 4;
  int32 duration_ms = 5;
  string content_type = 6;
  int32 channels = 7;
  string sample_format = 8;
  string text = 9;
  bool item_done = 10;
}

message ItemDone {
  int32 item_index = 1;
  int32 seq = 2;
  string text = 3;
}

message BackendLog {
  string level = 1;
  string message = 2;
  map<string, string> fields = 3;
}

message BackendUsage {
  int32 input_segments = 1;
  int32 output_items = 2;
  int64 audio_bytes = 3;
  map<string, string> metrics = 4;
}

enum BackendErrorCode {
  BACKEND_ERROR_UNSPECIFIED = 0;
  INVALID_REQUEST = 1;
  UNSUPPORTED_LANGUAGE = 2;
  UNSUPPORTED_OUTPUT_FORMAT = 3;
  PROMPT_REQUIRED = 4;
  PROMPT_FEATURE_INVALID = 5;
  MODEL_UNAVAILABLE = 6;
  OVERLOADED = 7;
  TIMEOUT = 8;
  INTERNAL = 9;
}
